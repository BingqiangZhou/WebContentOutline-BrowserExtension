name: Release Extension

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Verify and rename package asset
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SRC_ZIP=$(find dist/packages -maxdepth 1 -type f -name "v${VERSION}*.zip" | sort | head -1)
          if [ -z "$SRC_ZIP" ]; then echo "FAIL: v${VERSION}*.zip not found in dist/packages/" && ls dist/packages/ && exit 1; fi
          DEST_ZIP="dist/packages/webtoc-assistant-v${VERSION}.zip"
          mv "$SRC_ZIP" "$DEST_ZIP"

          node -e "const m=require('./.output/chrome-mv3/manifest.json'); if (m.version !== '${VERSION}') throw new Error('manifest version mismatch'); if (m.content_scripts) throw new Error('content_scripts should be runtime-injected, not manifest-registered'); if (m.background?.service_worker !== 'background.js') throw new Error('unexpected background worker');"

          unzip -l "$DEST_ZIP" > zip-list.txt
          grep -q "manifest.json" zip-list.txt
          grep -q "background.js" zip-list.txt
          grep -q "content-scripts/toc.js" zip-list.txt
          grep -q "content-scripts/toc.css" zip-list.txt
          grep -q "_locales/en/messages.json" zip-list.txt
          grep -q "icons/png/toc-disabled-128.png" zip-list.txt
          ! grep -q "^.*\\.claude/" zip-list.txt
          ! grep -q "^.*src/" zip-list.txt
          ! grep -q "^.*entrypoints/" zip-list.txt
          ! grep -q "^.*wxt.config.ts" zip-list.txt

          echo "file=$DEST_ZIP" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_version }}
          name: Release ${{ steps.version.outputs.tag_version }}
          body: |
            ## Web TOC Assistant ${{ steps.version.outputs.tag_version }}

            ### Installation / 安装

            **Option 1: Install from Web Store / 从应用商店安装**
            - [Chrome Web Store](https://chromewebstore.google.com/detail/fnicpbioofepnfgpdhggjmhjalogbgcn)
            - [Microsoft Edge Add-ons](https://microsoftedge.microsoft.com/addons/detail/jejjhfkmfdlccdbifpihkepaabcdlijc)

            **Option 2: Load Unpacked Extension / 加载已解压的扩展**
            1. Download the `webtoc-assistant-v${{ steps.version.outputs.version }}.zip` file below / 下载下方的 `webtoc-assistant-v${{ steps.version.outputs.version }}.zip` 文件
            2. Open Edge/Chrome and navigate to `edge://extensions/` or `chrome://extensions/` / 打开 Edge/Chrome 访问 `edge://extensions/` 或 `chrome://extensions/`
            3. Enable "Developer mode" / 启用"开发人员模式"
            4. Click "Load unpacked" and select the extracted folder / 点击"加载已解压的扩展程序"并选择解压后的文件夹

            ### Changes / 更新内容

            🇺🇸 English: [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md#${{ steps.version.outputs.version }})

            🇨🇳 中文：[CHANGELOG_CN.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG_CN.md#${{ steps.version.outputs.version }})
          files: ${{ steps.package.outputs.file }}
          draft: false
          prerelease: false
