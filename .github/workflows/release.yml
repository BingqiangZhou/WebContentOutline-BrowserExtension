name: Release Extension

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine release type
        id: release_type
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Pre-release tags contain a hyphen after the version: v1.3.0-pre, v1.3.0-beta.1
          if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+-'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "release_title=Pre-release $TAG" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "release_title=Release $TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run release:build

      - name: Get version and locate zip
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Find the actual zip file (may have branch suffix like -dev)
          ZIP_FILE=$(ls .output/webtoc-assistant-v${VERSION}*.zip 2>/dev/null | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "FAIL: no zip found matching .output/webtoc-assistant-v${VERSION}*.zip"
            ls .output/
            exit 1
          fi
          ZIP_NAME=$(basename "$ZIP_FILE")
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "Found zip: $ZIP_NAME"

      - name: Verify package asset
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_FILE="${{ steps.version.outputs.zip_file }}"

          node -e "const m=require('./.output/chrome-mv3/manifest.json'); if (m.version !== '${VERSION}') throw new Error('manifest version mismatch: ' + m.version + ' vs ${VERSION}'); if (m.content_scripts) throw new Error('content_scripts should be runtime-injected, not manifest-registered'); if (m.background?.service_worker !== 'background.js') throw new Error('unexpected background worker');"

          unzip -l "$ZIP_FILE" > zip-list.txt
          grep -q "manifest.json" zip-list.txt
          grep -q "background.js" zip-list.txt
          grep -q "content-scripts/toc.js" zip-list.txt
          grep -q "content-scripts/toc.css" zip-list.txt
          grep -q "_locales/en/messages.json" zip-list.txt
          grep -q "icons/png/toc-disabled-128.png" zip-list.txt
          ! grep -q "^.*\\.claude/" zip-list.txt
          ! grep -q "^.*src/" zip-list.txt
          ! grep -q "^.*entrypoints/" zip-list.txt
          ! grep -q "^.*wxt.config.ts" zip-list.txt
          echo "Verification passed ✓"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_type.outputs.tag }}
          name: ${{ steps.release_type.outputs.release_title }}
          body: |
            ## Web TOC Assistant ${{ steps.release_type.outputs.tag }}

            ${{ steps.release_type.outputs.prerelease == 'true' && '⚠️ **This is a pre-release build.** It may contain unfinished features or bugs. Use for testing only.' || '' }}

            ### Installation / 安装

            **Option 1: Install from Web Store / 从应用商店安装**
            - [Chrome Web Store](https://chromewebstore.google.com/detail/fnicpbioofepnfgpdhggjmhjalogbgcn)
            - [Microsoft Edge Add-ons](https://microsoftedge.microsoft.com/addons/detail/jejjhfkmfdlccdbifpihkepaabcdlijc)

            **Option 2: Load Unpacked Extension / 加载已解压的扩展**
            1. Download the `${{ steps.version.outputs.zip_name }}` file below / 下载下方的 `${{ steps.version.outputs.zip_name }}` 文件
            2. Open Edge/Chrome and navigate to `edge://extensions/` or `chrome://extensions/` / 打开 Edge/Chrome 访问 `edge://extensions/` 或 `chrome://extensions/`
            3. Enable "Developer mode" / 启用"开发人员模式"
            4. Click "Load unpacked" and select the extracted folder / 点击"加载已解压的扩展程序"并选择解压后的文件夹

            ### Changes / 更新内容

            🇺🇸 English: [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md#${{ steps.version.outputs.version }})

            🇨🇳 中文：[CHANGELOG_CN.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG_CN.md#${{ steps.version.outputs.version }})
          files: ${{ steps.version.outputs.zip_file }}
          draft: false
          prerelease: ${{ steps.release_type.outputs.prerelease }}
