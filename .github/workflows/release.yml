name: Release Extension

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate source files
        run: node build.js

      - name: Get version from manifest.json
        id: get-version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_version=v$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Create packages directory
        run: mkdir -p dist/packages

      - name: Package extension
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          zip -r "dist/packages/v${VERSION}.zip" . -x \
            ".claude/*" \
            "CLAUDE.md" \
            ".claude-*" \
            ".git/*" \
            ".gitignore" \
            ".gitattributes" \
            ".github/*" \
            "dist/*" \
            "node_modules/*" \
            "docs/superpowers/*" \
            "build.js" \
            "package.json" \
            "package-lock.json" \
            "*.md"
          echo "Package created: dist/packages/v${VERSION}.zip"

      - name: Get package file size
        id: package-info
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          FILE_SIZE=$(stat -c%s "dist/packages/v${VERSION}.zip" 2>/dev/null || stat -f%z "dist/packages/v${VERSION}.zip")
          echo "size=$FILE_SIZE" >> $GITHUB_OUTPUT
          echo "Package size: $FILE_SIZE bytes"

      - name: Rename asset
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          mv "dist/packages/v${VERSION}.zip" "dist/packages/webtoc-assistant-v${VERSION}.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get-version.outputs.tag_version }}
          name: Release ${{ steps.get-version.outputs.tag_version }}
          body: |
            ## Web TOC Assistant ${{ steps.get-version.outputs.tag_version }}

            ### Installation / 安装

            **Option 1: Install from Web Store / 从应用商店安装**
            - [Chrome Web Store](https://chromewebstore.google.com/detail/fnicpbioofepnfgpdhggjmhjalogbgcn)
            - [Microsoft Edge Add-ons](https://microsoftedge.microsoft.com/addons/detail/jejjhfkmfdlccdbifpihkepaabcdlijc)

            **Option 2: Load Unpacked Extension / 加载已解压的扩展**
            1. Download the `webtoc-assistant-v${{ steps.get-version.outputs.version }}.zip` file below / 下载下方的 `webtoc-assistant-v${{ steps.get-version.outputs.version }}.zip` 文件
            2. Open Edge/Chrome and navigate to `edge://extensions/` or `chrome://extensions/` / 打开 Edge/Chrome 访问 `edge://extensions/` 或 `chrome://extensions/`
            3. Enable "Developer mode" / 启用"开发人员模式"
            4. Click "Load unpacked" and select the extracted folder / 点击"加载已解压的扩展程序"并选择解压后的文件夹

            ### Changes / 更新内容

            🇺🇸 English: [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md#${{ steps.get-version.outputs.version }})

            🇨🇳 中文：[CHANGELOG_CN.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG_CN.md#${{ steps.get-version.outputs.version }})
          files: dist/packages/*.zip
          draft: false
          prerelease: false
